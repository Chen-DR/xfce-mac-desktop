# picom (pijulius fork) — mac 风格工作区切换动画
# 配合 ~/.local/bin/fullscreen-workspace.py 使用

backend = "glx";
vsync = true;

# 流畅性调优：整屏动画时全帧重绘更顺滑（GPU 足够强），
# 并关闭 frame pacing（Mesa/AMD 上有已知卡顿问题）
use-damage = false;
no-frame-pacing = true;

# 阴影
shadow = true;
shadow-radius = 14;
shadow-opacity = 0.55;
shadow-offset-x = -12;
shadow-offset-y = -12;

# 打开/关闭窗口的淡入淡出
fading = true;
fade-in-step = 0.07;
fade-out-step = 0.07;

# 面板和桌面不画阴影
rules = (
    { match = "window_type = 'dock' || window_type = 'desktop'"; shadow = false; }
);

# 工作区切换：整屏左右滑动（方向自动感知）
animations = (
    # 切到更高编号的桌面：旧窗口向左滑出，新窗口从右侧滑入
    { triggers = [ "workspace-out" ];         preset = "slide-out"; direction = "left";  duration = 0.3; },
    { triggers = [ "workspace-in" ];          preset = "slide-in";  direction = "right"; duration = 0.3; },
    # 切到更低编号的桌面：反方向
    { triggers = [ "workspace-out-inverse" ]; preset = "slide-out"; direction = "right"; duration = 0.3; },
    { triggers = [ "workspace-in-inverse" ];  preset = "slide-in";  direction = "left";  duration = 0.3; }
);
